# Universal Scraper — Configuration
#
# ADAPTERS: URL-pattern-specific handlers. If a URL matches an adapter,
# it is handled exclusively by that adapter (no fallback to providers).
# Add a new adapter: implement UrlAdapter in scraper/adapters/, register
# it in scraper/adapters/__init__.py, then add it below.
#
# Built-in adapters: google_trends

adapters:
  - name: google_trends    # trends.google.com/trends/explore URLs → SerpAPI
    enabled: true          # Requires SERPAPI_API_KEY in .env

# PROVIDERS: Generic web scrapers tried in fallback order for all other URLs.
# Set enabled: false to skip a provider without removing it.
#
# Built-in providers: pdf, jina, crawl4ai, firecrawl
# To add a custom provider, implement ScrapingProvider in scraper/providers/,
# register it in scraper/providers/__init__.py, then add it here.

providers:
  - name: pdf          # Direct download + text extraction for PDF URLs
    enabled: true

  - name: crawl4ai     # Headless Chromium — catches JS-heavy SPAs
    enabled: true

  - name: jina         # Free, fast — handles ~70% of static/simple sites
    enabled: true

  - name: firecrawl    # Paid API — last resort for bot-protected sites
    enabled: false     # Set to true and add FIRECRAWL_API_KEY to .env to enable
