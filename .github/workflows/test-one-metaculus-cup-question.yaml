name: Test Metaculus Cup questions

on:
  workflow_dispatch:
    inputs:
      question_id:
        description: "Optional Metaculus question ID. Leave blank to test eligible open Metaculus Cup questions."
        required: false
        type: string
      post_id:
        description: "Optional post ID. If provided with question_id, skips tournament lookup."
        required: false
        type: string
      submit:
        description: "Submit forecast and comment to Metaculus"
        required: true
        default: true
        type: boolean
      num_runs:
        description: "LLM runs for this test question"
        required: true
        default: "1"
        type: choice
        options:
          - "1"
          - "2"
          - "3"
      skip_previously_forecasted:
        description: "Skip if this account has already forecasted the question"
        required: true
        default: true
        type: boolean
      max_questions:
        description: "Maximum number of eligible questions to run"
        required: true
        default: "1"
        type: string
      question_type:
        description: "Question type to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - binary
          - numeric
          - discrete
          - multiple_choice
      token_limit:
        description: "OpenRouter estimated-token hard limit. 0 tracks only."
        required: true
        default: "0"
        type: string

concurrency:
  group: test-one-metaculus-cup-question
  cancel-in-progress: false

jobs:
  test_one_question:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Load cached venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install Python dependencies
        run: poetry install --no-interaction --no-root

      - name: Verify secrets are configured
        run: |
          echo "::group::API Key Configuration"
          echo "METACULUS_TOKEN:      $([ -n '${{ secrets.METACULUS_TOKEN }}'      ] && echo 'SET' || echo 'MISSING')"
          echo "OPENROUTER_API_KEY:   $([ -n '${{ secrets.OPENROUTER_API_KEY }}'   ] && echo 'SET' || echo 'MISSING')"
          echo "ASKNEWS_CLIENT_ID:    $([ -n '${{ secrets.ASKNEWS_CLIENT_ID }}'    ] && echo 'SET' || echo 'MISSING')"
          echo "ASKNEWS_SECRET:       $([ -n '${{ secrets.ASKNEWS_SECRET }}'       ] && echo 'SET' || echo 'MISSING')"
          echo "ASKNEWS_API_KEY:      $([ -n '${{ secrets.ASKNEWS_API_KEY }}'      ] && echo 'SET' || echo 'MISSING')"
          echo "JINA_API_KEY:         $([ -n '${{ secrets.JINA_API_KEY }}'         ] && echo 'SET' || echo 'MISSING')"
          echo "::endgroup::"

      - name: Run Metaculus Cup test
        run: |
          set -o pipefail
          poetry run python - <<'PY' 2>&1 | tee bot_run.log
          import asyncio
          import os

          from config import CURRENT_METACULUS_CUP_ID
          from forecasting_bot import validate_runtime_configuration
          from metaculus_client import get_open_question_ids_from_tournament
          from metaculus_client import get_post_details
          from orchestrator import forecast_is_already_made
          from orchestrator import forecast_questions


          def parse_bool(value: str) -> bool:
              return value.strip().lower() in {"1", "true", "yes", "y", "on"}


          def parse_optional_int(name: str) -> int | None:
              value = os.getenv(name, "").strip()
              return int(value) if value else None


          def parse_positive_int(name: str, default: str) -> int:
              value = os.getenv(name, default).strip()
              parsed = int(value)
              if parsed < 1:
                  raise RuntimeError(f"{name} must be at least 1.")
              return parsed


          async def collect_eligible_questions(
              questions: list[tuple[int, int]],
              max_questions: int,
              question_type_filter: str,
              skip_previously_forecasted: bool,
          ) -> list[tuple[int, int]]:
              if question_type_filter == "all" and not skip_previously_forecasted:
                  return questions[:max_questions]

              selected_questions = []
              for candidate_question_id, candidate_post_id in questions:
                  post_details = await get_post_details(candidate_post_id)
                  question_details = post_details["question"]
                  question_type = question_details["type"]
                  if question_type_filter != "all" and question_type != question_type_filter:
                      print(
                          "Skipping candidate because it does not match question_type: "
                          f"question_id={candidate_question_id}, post_id={candidate_post_id}, "
                          f"type={question_type}, wanted={question_type_filter}"
                      )
                      continue
                  if forecast_is_already_made(post_details):
                      if not skip_previously_forecasted:
                          selected_questions.append((candidate_question_id, candidate_post_id))
                          if len(selected_questions) >= max_questions:
                              break
                          continue
                      print(
                          "Skipping candidate because this account already forecasted it: "
                          f"question_id={candidate_question_id}, post_id={candidate_post_id}"
                      )
                      continue

                  selected_questions.append((candidate_question_id, candidate_post_id))
                  if len(selected_questions) >= max_questions:
                      break

              return selected_questions


          validate_runtime_configuration()

          question_id = parse_optional_int("QUESTION_ID")
          post_id = parse_optional_int("POST_ID")
          submit_prediction = parse_bool(os.getenv("SUBMIT_PREDICTION", "true"))
          skip_previously_forecasted = parse_bool(os.getenv("SKIP_PREVIOUSLY_FORECASTED", "true"))
          num_runs = int(os.getenv("NUM_RUNS", "1"))
          max_questions = parse_positive_int("MAX_QUESTIONS", "1")
          question_type_filter = os.getenv("QUESTION_TYPE", "all").strip()
          token_limit = float(os.getenv("TOKEN_LIMIT", "0"))
          valid_question_types = {"all", "binary", "numeric", "discrete", "multiple_choice"}
          if question_type_filter not in valid_question_types:
              raise RuntimeError(
                  f"QUESTION_TYPE must be one of {sorted(valid_question_types)}. "
                  f"Got {question_type_filter!r}."
              )

          if post_id is not None and question_id is None:
              raise RuntimeError("post_id was provided without question_id.")

          if question_id is not None and post_id is not None:
              if max_questions != 1 or question_type_filter != "all":
                  print(
                      "question_id and post_id were provided, so MAX_QUESTIONS and "
                      "QUESTION_TYPE automatic selection filters are ignored."
                  )
              selected_questions = [(question_id, post_id)]
          else:
              cup_questions = get_open_question_ids_from_tournament(CURRENT_METACULUS_CUP_ID)
              if question_id is None:
                  if not cup_questions:
                      raise RuntimeError("No open Metaculus Cup questions found.")
                  selected_questions = asyncio.run(
                      collect_eligible_questions(
                          cup_questions,
                          max_questions,
                          question_type_filter,
                          skip_previously_forecasted,
                      )
                  )
                  if not selected_questions:
                      print(
                          "No eligible open Metaculus Cup questions found for "
                          f"question_type={question_type_filter}, "
                          f"skip_previously_forecasted={skip_previously_forecasted}."
                      )
                      raise SystemExit(0)
              else:
                  if max_questions != 1 or question_type_filter != "all":
                      print(
                          "question_id was provided, so MAX_QUESTIONS and "
                          "QUESTION_TYPE automatic selection filters are ignored."
                      )
                  selected_questions = [
                      (candidate_question_id, candidate_post_id)
                      for candidate_question_id, candidate_post_id in cup_questions
                      if candidate_question_id == question_id
                  ]
                  if not selected_questions:
                      raise RuntimeError(
                          f"Question {question_id} was not found among open Metaculus Cup questions. "
                          "Provide post_id as well to test it directly."
                      )

          selected_question_list = ", ".join(
              f"{question_id}/{post_id}" for question_id, post_id in selected_questions
          )
          print(
              "Running Metaculus Cup test: "
              f"questions={len(selected_questions)} [{selected_question_list}], "
              f"submit={submit_prediction}, num_runs={num_runs}, "
              f"skip_previously_forecasted={skip_previously_forecasted}, "
              f"max_questions={max_questions}, question_type={question_type_filter}, "
              f"token_limit={token_limit:.0f}"
          )

          asyncio.run(
              forecast_questions(
                  selected_questions,
                  submit_prediction,
                  num_runs,
                  skip_previously_forecasted,
                  token_limit,
              )
          )
          PY
        env:
          PYTHONUNBUFFERED: "1"
          PYTHONFAULTHANDLER: "1"
          QUESTION_ID: ${{ inputs.question_id }}
          POST_ID: ${{ inputs.post_id }}
          SUBMIT_PREDICTION: ${{ inputs.submit }}
          NUM_RUNS: ${{ inputs.num_runs }}
          SKIP_PREVIOUSLY_FORECASTED: ${{ inputs.skip_previously_forecasted }}
          MAX_QUESTIONS: ${{ inputs.max_questions }}
          QUESTION_TYPE: ${{ inputs.question_type }}
          TOKEN_LIMIT: ${{ inputs.token_limit }}
          METACULUS_TOKEN: ${{ secrets.METACULUS_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ASKNEWS_CLIENT_ID: ${{ secrets.ASKNEWS_CLIENT_ID }}
          ASKNEWS_SECRET: ${{ secrets.ASKNEWS_SECRET }}
          ASKNEWS_API_KEY: ${{ secrets.ASKNEWS_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          METACULUS_MAX_CONCURRENT_REQUESTS: ${{ vars.METACULUS_MAX_CONCURRENT_REQUESTS || '1' }}
          METACULUS_REQUEST_INTERVAL: ${{ vars.METACULUS_REQUEST_INTERVAL || '3.0' }}
          INITIAL_API_GET_RETRY_WAIT_SECONDS: ${{ vars.INITIAL_API_GET_RETRY_WAIT_SECONDS || '3.0' }}
          ASKNEWS_CACHE_MODE: ${{ vars.ASKNEWS_CACHE_MODE || 'no_cache' }}
          OPENROUTER_COST_HARD_LIMIT_USD: ${{ vars.OPENROUTER_COST_HARD_LIMIT_USD || '0' }}

      - name: Upload bot log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metaculus-cup-test-log-${{ github.run_id }}
          path: bot_run.log
          retention-days: 14
